# Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx6G
# Native
kotlin.apple.xcodeCompatibility.nowarn=true
kotlin.native.cacheKind=none
# Gradle
org.gradle.jvmargs=-Xmx8G -Dfile.encoding=UTF-8
org.gradle.warning.mode=none
# Android
android.nonTransitiveRClass=true
android.useAndroidX=true
android.suppressUnsupportedCompileSdk=36
android.forcePreviewLibrarys=true
android.dependency.excludeLibraryComponentsFromConstraints=true
android.defaults.buildfeatures.resvalues=true
android.sdk.defaultTargetSdkToCompileSdkIfUnset=false
android.usesSdkInManifest.disallowed=false
android.uniquePackageNames=false
android.dependency.useConstraints=true
android.r8.strictFullModeForKeepRules=false
android.r8.optimizedResourceShrinking=false
android.builtInKotlin=true
android.newDsl=false
# Cinterop commonization
kotlin.mpp.enableCInteropCommonization=true
kotlin.mpp.enableCInteropCommonization.nowarn=true
#org.gradle.configuration-cache=true
org.gradle.configuration-cache=false