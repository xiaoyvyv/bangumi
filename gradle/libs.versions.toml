compose-grid = { module = "com.cheonjaeung.compose.grid:grid", version = "2.6.0" }
compose-webview = { module = "io.github.kevinnzou:compose-webview-multiplatform", version.ref = "compose-webview" }
compose-confettikit = { module = "io.github.vinceglb:confettikit", version.ref = "confettikit" }

# cryptohash
cryptohash = { module = "com.appmattus.crypto:cryptohash", version.ref = "cryptohash" }
