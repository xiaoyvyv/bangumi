# Vico
vico-multiplatform = { group = "com.patrykandpatrick.vico", name = "multiplatform", version.ref = "vico" }
vico-multiplatform-m3 = { group = "com.patrykandpatrick.vico", name = "multiplatform-m3", version.ref = "vico" }

# FileKit
filekit-core = { module = "io.github.vinceglb:filekit-core", version.ref = "file-kit" }
filekit-dialogs-compose = { module = "io.github.vinceglb:filekit-dialogs-compose", version.ref = "file-kit" }
filekit-coil = { module = "io.github.vinceglb:filekit-coil", version.ref = "file-kit" }

krop = { module = "com.attafitamim.krop:core", version.ref = "krop" }
krop-file = { module = "com.attafitamim.krop:extensions-filekit", version.ref = "krop" }


[bundles]
gradle-plugins = [
    "gradle-plugin-agp",
    "gradle-plugin-compose",
    "gradle-plugin-compose-compiler",
    "gradle-plugin-kotlin",
    "gradle-plugin-serialization"
]
