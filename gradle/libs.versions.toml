# compose-common
compose-performance-annotation = { module = "androidx.performance:performance-annotation", version = "1.0.0-alpha01" }
compose-lifecycle-viewmodel = { group = "org.jetbrains.androidx.lifecycle", name = "lifecycle-viewmodel", version.ref = "androidx-lifecycle" }
