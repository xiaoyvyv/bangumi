name: Compose Multiplatform CI

on:
  push:
    branches: [ 'multiplatform' ]
  pull_request:
    branches: [ 'multiplatform' ]

jobs:
  build:
    runs-on: macos-latest
    env:
      JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 安装 Cocoapods
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod repo update

      # 安装 Java
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 安装 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          build-tools: 33.0.0
          ndk-version: 25.2.9519653

      # 构建 Android APK
      - name: Build Android Release
        run: ./gradlew :composeApp:assembleRelease --stacktrace

      # 上传 Android APK
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: composeApp/build/outputs/apk/release/*.apk

      # 构建 iOS
      - name: Build iOS Release
        run: |
          cd iosApp
          pod install
          xcodebuild \
            -scheme iosApp \
            -configuration Release \
            -workspace iosApp.xcworkspace \
            -sdk iphoneos \
            -archivePath build/iosApp.xcarchive archive

      # 导出 IPA
      - name: Export iOS IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath iosApp/build/iosApp.xcarchive \
            -exportPath iosApp/build/ipa \
            -exportOptionsPlist iosApp/ExportOptions.plist

      # 上传 IPA
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: iosApp/build/ipa/*.ipa
